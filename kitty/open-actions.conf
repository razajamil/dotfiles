# Open text files in the default editor as an overlay
protocol file
mime text/*
action launch --type=overlay --cwd=current ${EDITOR} ${FILE_PATH}

# Optional: Support opening at a specific line (e.g., from grep results)
protocol file
fragment_matches [0-9]+
action launch --type=overlay --cwd=current $EDITOR +${FRAGMENT} ${FILE_PATH}

# Open images in terminal using kitty image protocol
protocol file
mime image/*
action launch --type=os-window kitten icat --hold -- ${FILE_PATH}
